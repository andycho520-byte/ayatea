<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>官方網站</title>
    <style>
        :root {--bg:#0a0e17;--card:#131a26;--p:#00f2fe;--s:#4facfe;--w:#fff;--m:#a0aec0;}
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;scroll-behavior:smooth;}
        body{background:var(--bg);color:var(--w);}
        .container{max-width:1100px;margin:auto;padding:0 20px;}
        .section{padding:60px 0;}
        
        /* 輪播 */
        .carousel{height:600px;position:relative;overflow:hidden;}
        .slide{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transition:opacity 1s;}
        .slide.active{opacity:1;}
        .overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:1;}
        .content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;text-align:center;max-width:800px;}
        
        /* 內容 */
        .rich img{max-width:100%;height:auto;border-radius:8px;margin:10px 0;}
        .rich p{line-height:1.7;color:var(--m);margin-bottom:10px;}
        .title{font-size:28px;margin-bottom:20px;color:var(--p);}
        
        /* 表單 */
        .form-panel{background:var(--card);padding:30px;border-radius:16px;margin-top:30px;}
        .form-group{margin-bottom:16px;}
        .form-group label{display:block;margin-bottom:6px;color:var(--w);}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:12px;background:#0d121c;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;outline:none;}
        .form-group input:focus{border-color:var(--p);}
        button{background:linear-gradient(90deg,var(--p),var(--s));border:none;padding:12px 24px;border-radius:8px;color:#000;font-weight:bold;cursor:pointer;margin-top:10px;}
    </style>
</head>
<body>

<!-- 輪播 -->
<div class="carousel" id="carousel"></div>

<!-- 首頁內容 -->
<section class="section">
    <div class="container">
        <div id="homeContent" class="rich"></div>
    </div>
</section>

<!-- 關於我們 -->
<section class="section" style="background:var(--card);">
    <div class="container">
        <h2 class="title">關於我們</h2>
        <div id="aboutContent" class="rich"></div>
    </div>
</section>

<!-- 自訂表單 -->
<section class="section">
    <div class="container">
        <div class="form-panel">
            <h2 class="title" id="formTitleText">線上諮詢</h2>
            <p id="formDescText" style="color:var(--m);margin-bottom:20px;"></p>
            <form id="dynamicForm"></form>
        </div>
    </div>
</section>

<script>
//=========================
// 讀取後台資料
//=========================
let data = JSON.parse(localStorage.getItem("websiteData") || "{}");

//=========================
// 輪播
//=========================
function renderCarousel(){
    let wrap = $("#carousel");
    let imgs = data.banners || [];
    if(imgs.length == 0){
        wrap.html(`<div class="slide active" style="background-image:url(https://picsum.photos/1920/1080)"><div class="overlay"></div><div class="content"><h1>歡迎來到官方網站</h1></div></div>`);
        return;
    }
    imgs.forEach((img,i)=>{
        wrap.append(`
        <div class="slide ${i==0?'active':''}" style="background-image:url(${img})">
            <div class="overlay"></div>
            <div class="content">
                <h1 style="font-size:36px;color:#fff">輪播圖 ${i+1}</h1>
            </div>
        </div>`);
    });

    let speed = data.carouselSpeed || 3000;
    let cur = 0;
    setInterval(()=>{
        $(".slide").removeClass("active");
        cur = (cur + 1) % imgs.length;
        $(".slide").eq(cur).addClass("active");
    }, speed);
}

//=========================
// 內容
//=========================
function renderContent(){
    $("#homeContent").html(data.home || "<h2>首頁內容</h2><p>請至後台編輯</p>");
    $("#aboutContent").html(data.about || "<p>請至後台編輯</p>");
    $("#formTitleText").text(data.formTitle || "線上諮詢");
    $("#formDescText").text(data.formDesc || "");
}

//=========================
// 動態表單
//=========================
function renderForm(){
    let form = $("#dynamicForm");
    let fields = data.formFields || [];
    if(fields.length == 0){
        form.html(`<div class="form-group"><label>姓名</label><input name="姓名" type="text"></div><button>送出</button>`);
        return;
    }
    fields.forEach(f=>{
        let name = f.name || "欄位";
        if(f.type == "text") form.append(`<div class="form-group"><label>${name}</label><input name="${name}" type="text"></div>`);
        if(f.type == "email") form.append(`<div class="form-group"><label>${name}</label><input name="${name}" type="email"></div>`);
        if(f.type == "textarea") form.append(`<div class="form-group"><label>${name}</label><textarea name="${name}"></textarea></div>`);
        if(f.type == "select") form.append(`<div class="form-group"><label>${name}</label><select name="${name}"><option>選項1</option><option>選項2</option></select></div>`);
    });
    form.append(`<button type="submit">提交表單</button>`);
}

//=========================
// 執行
//=========================
$(function(){
    renderCarousel();
    renderContent();
    renderForm();
});
</script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</body>
</html>
