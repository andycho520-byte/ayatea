<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTeaBot 後台管理</title>
    <link rel="stylesheet" href="style.css">
    <!-- 富文本編輯器依賴 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css">
    <style>
        /* 後台專屬樣式 */
        .admin-container {
            max-width: 1200px;
            margin: 80px auto 50px;
            padding: 0 20px;
        }
        .editor-section {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .editor-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--primary);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-main);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 8px;
            outline: none;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary);
        }
        .btn-save {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #000;
            font-weight: bold;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        .preview-btn {
            background: #4facfe;
            color: #000;
            font-weight: bold;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            margin-left: 10px;
        }
        .save-status {
            margin-top: 15px;
            color: var(--primary);
        }
        /* 富文本編輯器樣式適配 */
        .note-editor {
            border: 1px solid rgba(0,242,254,0.2) !important;
        }
        .note-toolbar {
            background-color: var(--bg-card) !important;
            border-bottom: 1px solid rgba(0,242,254,0.1) !important;
        }
        .note-btn {
            color: var(--text-main) !important;
            border-color: rgba(255,255,255,0.1) !important;
        }
        .note-editable {
            background-color: var(--bg-main) !important;
            color: var(--text-main) !important;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Smart<span>TeaBot</span> | 後台管理</div>
        <ul class="nav-links">
            <li><a href="index.html" target="_blank">前台預覽</a></li>
        </ul>
    </nav>

    <div class="admin-container">
        <div class="editor-section">
            <h2 class="editor-title">1. 首頁核心文案配置</h2>
            <div class="form-group">
                <label>Hero 區標題</label>
                <input type="text" id="heroTitle" placeholder="輸入首頁大標題">
            </div>
            <div class="form-group">
                <label>Hero 區副標題</label>
                <textarea id="heroDesc" rows="2" placeholder="輸入首頁副標題"></textarea>
            </div>
            <div class="form-group">
                <label>Hero 區按鈕文字</label>
                <input type="text" id="heroBtnText" placeholder="輸入按鈕文字">
            </div>
        </div>

        <div class="editor-section">
            <h2 class="editor-title">2. 核心功能區配置</h2>
            <div class="form-group">
                <label>功能區標題</label>
                <input type="text" id="featuresTitle" placeholder="輸入功能區標題">
            </div>
            <!-- 功能卡片1 -->
            <div class="form-group">
                <label>功能卡片1 - 圖標（FontAwesome類名，例：fa-solid fa-microchip）</label>
                <input type="text" id="feature1Icon" placeholder="輸入圖標類名">
            </div>
            <div class="form-group">
                <label>功能卡片1 - 標題</label>
                <input type="text" id="feature1Title" placeholder="輸入卡片標題">
            </div>
            <div class="form-group">
                <label>功能卡片1 - 描述</label>
                <textarea id="feature1Desc" rows="2" placeholder="輸入卡片描述"></textarea>
            </div>
            <!-- 功能卡片2 -->
            <div class="form-group">
                <label>功能卡片2 - 圖標</label>
                <input type="text" id="feature2Icon" placeholder="輸入圖標類名">
            </div>
            <div class="form-group">
                <label>功能卡片2 - 標題</label>
                <input type="text" id="feature2Title" placeholder="輸入卡片標題">
            </div>
            <div class="form-group">
                <label>功能卡片2 - 描述</label>
                <textarea id="feature2Desc" rows="2" placeholder="輸入卡片描述"></textarea>
            </div>
            <!-- 功能卡片3 -->
            <div class="form-group">
                <label>功能卡片3 - 圖標</label>
                <input type="text" id="feature3Icon" placeholder="輸入圖標類名">
            </div>
            <div class="form-group">
                <label>功能卡片3 - 標題</label>
                <input type="text" id="feature3Title" placeholder="輸入卡片標題">
            </div>
            <div class="form-group">
                <label>功能卡片3 - 描述</label>
                <textarea id="feature3Desc" rows="2" placeholder="輸入卡片描述"></textarea>
            </div>
        </div>

        <div class="editor-section">
            <h2 class="editor-title">3. 影片區配置</h2>
            <div class="form-group">
                <label>影片區標題</label>
                <input type="text" id="videoTitle" placeholder="輸入影片區標題">
            </div>
            <div class="form-group">
                <label>YouTube 影片鏈接（嵌入鏈接，例：https://www.youtube.com/embed/xxx）</label>
                <input type="text" id="videoUrl" placeholder="輸入影片嵌入鏈接">
            </div>
        </div>

        <div class="editor-section">
            <h2 class="editor-title">4. 關於我們區配置</h2>
            <div class="form-group">
                <label>關於我們標題</label>
                <input type="text" id="aboutTitle" placeholder="輸入關於我們標題">
            </div>
            <div class="form-group">
                <label>關於我們內容（支援富文本/圖片）</label>
                <div id="aboutContent"></div>
            </div>
            <div class="form-group">
                <label>統計數字1（例：50+）</label>
                <input type="text" id="stat1Num" placeholder="輸入數字">
            </div>
            <div class="form-group">
                <label>統計數字1描述</label>
                <input type="text" id="stat1Desc" placeholder="輸入描述">
            </div>
            <div class="form-group">
                <label>統計數字2（例：100+）</label>
                <input type="text" id="stat2Num" placeholder="輸入數字">
            </div>
            <div class="form-group">
                <label>統計數字2描述</label>
                <input type="text" id="stat2Desc" placeholder="輸入描述">
            </div>
        </div>

        <div class="editor-section">
            <h2 class="editor-title">5. 聯繫我們區配置</h2>
            <div class="form-group">
                <label>聯繫區標題</label>
                <input type="text" id="contactTitle" placeholder="輸入聯繫區標題">
            </div>
            <div class="form-group">
                <label>表單提交按鈕文字</label>
                <input type="text" id="contactBtnText" placeholder="輸入按鈕文字">
            </div>
        </div>

        <button class="btn-save" onclick="saveAllSettings()">保存所有配置</button>
        <button class="preview-btn" onclick="window.open('index.html', '_blank')">前台預覽</button>
        <div id="saveStatus" class="save-status"></div>
    </div>

    <!-- 依賴JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/lang/summernote-zh-TW.min.js"></script>

    <script>
        // 初始化富文本編輯器
        $(document).ready(function() {
            $('#aboutContent').summernote({
                lang: 'zh-TW',
                height: 200,
                placeholder: '輸入關於我們的內容，支援文字格式、圖片插入...',
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'italic', 'underline', 'clear']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['insert', ['link', 'picture']],
                    ['view', ['codeview', 'help']]
                ],
                // 圖片上傳（本地預覽，生產環境可接後端API）
                callbacks: {
                    onImageUpload: function(files) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            $('#aboutContent').summernote('insertImage', e.target.result);
                        }
                        reader.readAsDataURL(files[0]);
                    }
                }
            });

            // 加載已保存的配置
            loadSavedSettings();
        });

        // 加載保存的配置到編輯器
        function loadSavedSettings() {
            const savedData = localStorage.getItem('smartTeaBotSettings');
            if (savedData) {
                const data = JSON.parse(savedData);
                
                // 1. Hero區
                $('#heroTitle').val(data.heroTitle || '');
                $('#heroDesc').val(data.heroDesc || '');
                $('#heroBtnText').val(data.heroBtnText || '');
                
                // 2. 功能區
                $('#featuresTitle').val(data.featuresTitle || '');
                $('#feature1Icon').val(data.feature1Icon || '');
                $('#feature1Title').val(data.feature1Title || '');
                $('#feature1Desc').val(data.feature1Desc || '');
                $('#feature2Icon').val(data.feature2Icon || '');
                $('#feature2Title').val(data.feature2Title || '');
                $('#feature2Desc').val(data.feature2Desc || '');
                $('#feature3Icon').val(data.feature3Icon || '');
                $('#feature3Title').val(data.feature3Title || '');
                $('#feature3Desc').val(data.feature3Desc || '');
                
                // 3. 影片區
                $('#videoTitle').val(data.videoTitle || '');
                $('#videoUrl').val(data.videoUrl || '');
                
                // 4. 關於我們區
                $('#aboutTitle').val(data.aboutTitle || '');
                $('#aboutContent').summernote('code', data.aboutContent || '');
                $('#stat1Num').val(data.stat1Num || '');
                $('#stat1Desc').val(data.stat1Desc || '');
                $('#stat2Num').val(data.stat2Num || '');
                $('#stat2Desc').val(data.stat2Desc || '');
                
                // 5. 聯繫區
                $('#contactTitle').val(data.contactTitle || '');
                $('#contactBtnText').val(data.contactBtnText || '');
            }
        }

        // 保存所有配置到localStorage
        function saveAllSettings() {
            const settings = {
                // 1. Hero區
                heroTitle: $('#heroTitle').val().trim(),
                heroDesc: $('#heroDesc').val().trim(),
                heroBtnText: $('#heroBtnText').val().trim(),
                
                // 2. 功能區
                featuresTitle: $('#featuresTitle').val().trim(),
                feature1Icon: $('#feature1Icon').val().trim(),
                feature1Title: $('#feature1Title').val().trim(),
                feature1Desc: $('#feature1Desc').val().trim(),
                feature2Icon: $('#feature2Icon').val().trim(),
                feature2Title: $('#feature2Title').val().trim(),
                feature2Desc: $('#feature2Desc').val().trim(),
                feature3Icon: $('#feature3Icon').val().trim(),
                feature3Title: $('#feature3Title').val().trim(),
                feature3Desc: $('#feature3Desc').val().trim(),
                
                // 3. 影片區
                videoTitle: $('#videoTitle').val().trim(),
                videoUrl: $('#videoUrl').val().trim(),
                
                // 4. 關於我們區
                aboutTitle: $('#aboutTitle').val().trim(),
                aboutContent: $('#aboutContent').summernote('code'),
                stat1Num: $('#stat1Num').val().trim(),
                stat1Desc: $('#stat1Desc').val().trim(),
                stat2Num: $('#stat2Num').val().trim(),
                stat2Desc: $('#stat2Desc').val().trim(),
                
                // 5. 聯繫區
                contactTitle: $('#contactTitle').val().trim(),
                contactBtnText: $('#contactBtnText').val().trim()
            };

            // 保存到localStorage
            localStorage.setItem('smartTeaBotSettings', JSON.stringify(settings));
            
            // 顯示保存狀態
            const statusEl = $('#saveStatus');
            statusEl.text('✅ 所有配置已成功保存！前台已同步更新');
            setTimeout(() => {
                statusEl.text('');
            }, 3000);
        }
    </script>
</body>
</html>
