<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧奶茶機 - 自由排版編輯器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#6B7280',
                    },
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .draggable {
                @apply absolute transition-shadow duration-200 border border-dashed border-gray-300 bg-white/90 p-2 rounded shadow-sm select-none;
            }
            .draggable:hover {
                @apply ring-2 ring-primary/50 border-solid border-primary;
            }
            .drag-handle {
                @apply bg-gray-200 text-gray-500 text-xs px-1 py-0.5 rounded cursor-move mb-1 flex justify-between items-center;
            }
            .editor-toolbar {
                @apply fixed top-0 left-0 right-0 bg-white shadow-md z-50 p-2 flex gap-2 flex-wrap items-center;
            }
            .canvas-area {
                @apply mt-16 min-h-[100vh] p-8 bg-gray-900 relative overflow-hidden;
            }
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="editor-toolbar">
        <button onclick="addText()" class="bg-primary text-white px-3 py-2 rounded hover:bg-primary/90 flex items-center gap-1 text-sm">
            <i class="fa fa-font"></i> 新增文字
        </button>
        <button onclick="addImage()" class="bg-primary text-white px-3 py-2 rounded hover:bg-primary/90 flex items-center gap-1 text-sm">
            <i class="fa fa-image"></i> 新增圖片
        </button>
        <button onclick="addVideo()" class="bg-red-600 text-white px-3 py-2 rounded hover:bg-red-700 flex items-center gap-1 text-sm">
            <i class="fa fa-youtube-play"></i> 新增影片
        </button>
        <button onclick="exportAsImage()" class="bg-green-600 text-white px-3 py-2 rounded hover:bg-green-700 flex items-center gap-1 text-sm">
            <i class="fa fa-download"></i> 匯出圖片
        </button>
        <button onclick="clearCanvas()" class="bg-gray-500 text-white px-3 py-2 rounded hover:bg-gray-600 flex items-center gap-1 text-sm">
            <i class="fa fa-trash"></i> 清空
        </button>
        <span class="ml-auto text-gray-500 text-xs self-center">🔧 操作指南：拖曳元件上方的 [:::拖曳] 標籤來移動排版｜雙擊元件可刪除</span>
    </div>

    <div id="canvas" class="canvas-area">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 rounded-full filter blur-3xl pointer-events-none"></div>
    </div>

    <input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">

    <script>
        const canvas = document.getElementById('canvas');
        let zIndex = 10;

        // 初始化拖曳
        initDragDrop();

        // 共通：建立帶有拖曳把手的積木外殼
        function createWrapper(width = 'auto') {
            const wrapper = document.createElement('div');
            wrapper.className = 'draggable';
            wrapper.style.left = '120px';
            wrapper.style.top = '120px';
            wrapper.style.zIndex = zIndex++;
            wrapper.style.width = width;

            // 建立拖曳把手，避免改字時跟拖曳打架
            const handle = document.createElement('div');
            handle.className = 'drag-handle';
            handle.innerHTML = '<span><i class="fa fa-arrows"></i> :::拖曳</span><span class="text-[10px] text-gray-400">雙擊刪除</span>';
            
            wrapper.appendChild(handle);
            setupElementEvents(wrapper);
            return wrapper;
        }

        // 1. 新增文字
        function addText() {
            const wrapper = createWrapper('250px');
            const textEl = document.createElement('div');
            textEl.className = 'p-1 outline-none text-gray-800 text-base font-medium';
            textEl.contentEditable = true;
            textEl.innerText = '點擊這裡輸入智慧奶茶機介紹文案';
            
            // 點擊文字內部時，暫時允許選取文字
            textEl.addEventListener('focus', () => { wrapper.style.cursor = 'default'; });
            textEl.addEventListener('blur', () => { wrapper.style.cursor = 'move'; });

            wrapper.appendChild(textEl);
            canvas.appendChild(wrapper);
        }

        // 2. 新增圖片
        function addImage() {
            document.getElementById('imageUpload').click();
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const wrapper = createWrapper('220px');
                const img = document.createElement('img');
                img.src = e.target.result;
                img.className = 'w-full h-auto rounded';
                
                wrapper.appendChild(img);
                canvas.appendChild(wrapper);
            };
            reader.readAsDataURL(file);
        }

        // 3. 🔥 新增影片功能（支援貼上 YouTube 網址）
        function addVideo() {
            const url = prompt('請輸入 YouTube 影片網址：\n(例如: https://www.youtube.com/watch?v=dQw4w9WgXcQ)');
            if (!url) return;

            // 轉換 YouTube 網址為 Embed 嵌入格式
            let videoId = '';
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            if (match && match[2].length === 11) {
                videoId = match[2];
            } else {
                alert('網址格式不正確，請貼上正確的 YouTube 網址！');
                return;
            }

            const wrapper = createWrapper('400px');
            const videoContainer = document.createElement('div');
            videoContainer.className = 'w-full aspect-video bg-black rounded overflow-hidden pointer-events-none'; // 鎖定內嵌點擊，方便拖曳
            videoContainer.innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;

            wrapper.appendChild(videoContainer);
            canvas.appendChild(wrapper);
        }

        // 設定元件層級與刪除事件
        function setupElementEvents(el) {
            el.addEventListener('mousedown', () => {
                el.style.zIndex = zIndex++;
            });

            // 雙擊元件刪除
            el.addEventListener('dblclick', (e) => {
                if (confirm('確定要刪除這個區塊元件嗎？')) {
                    el.remove();
                }
                e.stopPropagation();
            });
        }

        // 核心：精準拖曳演算法（只有按住 [:::拖曳] 把手才能移動）
        function initDragDrop() {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            let currentEl = null;
            
            document.onmousedown = function(e) {
                // 必須點擊在拖曳把手（drag-handle）上才觸發移動，完美解決改字被干擾的問題！
                const handle = e.target.closest('.drag-handle');
                if (!handle) return;
                
                currentEl = handle.closest('.draggable');
                e.preventDefault();
                
                pos3 = e.clientX;
                pos4 = e.clientY;
                
                document.onmousemove = function(e) {
                    if (!currentEl) return;
                    e.preventDefault();
                    
                    pos1 = pos3 - e.clientX;
                    pos2 = pos4 - e.clientY;
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                    
                    currentEl.style.top = (currentEl.offsetTop - pos2) + "px";
                    currentEl.style.left = (currentEl.offsetLeft - pos1) + "px";
                }
                
                document.onmouseup = function() {
                    document.onmousemove = null;
                    document.onmouseup = null;
                    currentEl = null;
                }
            }
        }

        // 匯出畫布為圖片
        function exportAsImage() {
            // 匯出前先隱藏所有元件的「拖曳把手」和「虛線邊框」，讓匯出的圖片最完美乾淨
            const handles = document.querySelectorAll('.drag-handle');
            const draggables = document.querySelectorAll('.draggable');
            handles.forEach(h => h.style.display = 'none');
            draggables.forEach(d => d.style.border = 'none');

            const canvasArea = document.getElementById('canvas');
            html2canvas(canvasArea, {
                backgroundColor: '#111827', // 配合科技黑背景
                scale: 2,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = '智慧奶茶機官網排版.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                // 匯出完成後恢復顯示把手，方便繼續編輯
                handles.forEach(h => h.style.display = 'flex');
                draggables.forEach(d => d.style.border = '1px dashed #d1d5db');
            });
        }

        // 清空畫布
        function clearCanvas() {
            if (confirm('確定要清空所有內容嗎？')) {
                canvas.innerHTML = '<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/20 rounded-full filter blur-3xl pointer-events-none"></div>';
            }
        }

        // 預設載入一組引導文字
        window.onload = function() {
            addText();
        }
    </script>
</body>
</html>
