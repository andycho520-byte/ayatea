<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後台管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --bg:#0a0e17; --card:#131a26; --p:#00f2fe; --s:#4facfe; --w:#fff; --m:#a0aec0;
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}
        body{background:var(--bg);color:var(--w);padding-bottom:60px;}
        
        /* 登入頁 */
        .login{max-width:400px;margin:100px auto;padding:30px;background:var(--card);border-radius:16px;border:1px solid rgba(0,242,254,.2);}
        .login h2{color:var(--p);margin-bottom:20px;text-align:center;}
        .login input{width:100%;padding:12px;margin:8px 0;background:#0d121c;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;outline:none;}
        .login input:focus{border-color:var(--p);}
        .login button{width:100%;padding:12px;background:linear-gradient(90deg,var(--p),var(--s));border:none;border-radius:8px;color:#000;font-weight:bold;margin-top:10px;cursor:pointer;}
        
        /* 後台介面 */
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:16px 5%;background:rgba(10,14,23,.95);position:sticky;top:0;z-index:99;border-bottom:1px solid rgba(0,242,254,.1);}
        .logo{font-size:20px;font-weight:bold;color:var(--p);}
        .btn{padding:8px 16px;border-radius:8px;background:var(--p);color:#000;border:none;cursor:pointer;font-weight:bold;text-decoration:none;}
        .btn-outline{background:transparent;border:1px solid var(--p);color:var(--p);}
        .container{max-width:1100px;margin:30px auto;padding:0 20px;}
        .panel{background:var(--card);border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid rgba(0,242,254,.1);}
        .panel h3{color:var(--p);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
        input,select,textarea{width:100%;padding:10px;background:#0d121c;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;outline:none;margin-bottom:8px;}
        input:focus,select:focus,textarea:focus{border-color:var(--p);}
        .tip{color:#777;font-size:12px;margin-bottom:8px;}
        
        /* 輪播圖 */
        .banner-item{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
        .banner-item input{flex:1;}
        .del{color:#ff4466;background:transparent;border:none;cursor:pointer;}
        
        /* 表單欄位 */
        .field-item{display:grid;grid-template-columns:1fr 100px 80px;gap:8px;align-items:center;}
        .status{padding:10px;border-radius:8px;text-align:center;margin:10px 0;display:none;}
        .success{background:rgba(0,255,136,.1);color:#0f0;display:block;}
        .error{background:rgba(255,68,102,.1);color:#f66;display:block;}
    </style>
</head>
<body>

<div id="loginPage" class="login">
    <h2>管理員登入</h2>
    <input id="adminUser" placeholder="帳號" value="admin">
    <input id="adminPwd" type="password" placeholder="密碼" value="123456">
    <button onclick="adminLogin()">登入</button>
</div>

<div id="adminPanel" style="display:none;">
    <div class="navbar">
        <div class="logo"><i class="fa-solid fa-rocket"></i> 網站後台</div>
        <div style="display:flex;gap:10px;">
            <button class="btn btn-outline" onclick="window.open('index.html')">預覽網站</button>
            <button class="btn" onclick="saveAllData()">儲存全部</button>
        </div>
    </div>

    <div class="container">
        <div id="status" class="status"></div>

        <div class="panel">
            <h3><i class="fa-solid fa-images"></i> 多Banner輪播</h3>
            <div class="tip">上傳圖片後會自動產生網址，貼到下方輪播清單</div>
            <input type="file" multiple onchange="uploadBanner(event)">
            <div id="bannerList" style="margin-top:10px;"></div>
            <button class="btn btn-outline" onclick="addBanner()" style="margin-top:10px;">新增輪播圖</button>
        </div>

        <div class="panel">
            <h3><i class="fa-solid fa-sliders"></i> 輪播設定</h3>
            <input id="carouselSpeed" placeholder="輪播速度(毫秒) 3000 = 3秒">
        </div>

        <div class="panel">
            <h3><i class="fa-solid fa-pen-to-square"></i> 首頁內容</h3>
            <div id="homeEditor"></div>
        </div>

        <div class="panel">
            <h3><i class="fa-solid fa-address-card"></i> 關於我們</h3>
            <div id="aboutEditor"></div>
        </div>

        <div class="panel">
            <h3><i class="fa-solid fa-table-list"></i> 自訂表單欄位</h3>
            <div class="tip">可隨意增減欄位，前台會自動產生</div>
            <div id="formFields"></div>
            <button class="btn btn-outline" onclick="addFormField()">新增欄位</button>
        </div>

        <div class="panel">
            <h3><i class="fa-solid fa-envelope"></i> 表單標題與說明</h3>
            <input id="formTitle" placeholder="表單標題">
            <textarea id="formDesc" rows="3" placeholder="表單說明"></textarea>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/lang/summernote-zh-TW.min.js"></script>

<script>
//=========================
// 後台登入
//=========================
function adminLogin(){
    let user = $("#adminUser").val();
    let pwd = $("#adminPwd").val();
    if(user == "admin" && pwd == "123456"){
        localStorage.setItem("adminLoggedIn", "1");
        $("#loginPage").hide();
        $("#adminPanel").show();
        initEditor();
        loadData();
    }else{
        showStatus("帳號或密碼錯誤", "error");
    }
}

//=========================
// 檢查登入狀態
//=========================
$(function(){
    if(localStorage.getItem("adminLoggedIn") == "1"){
        $("#loginPage").hide();
        $("#adminPanel").show();
        initEditor();
        loadData();
    }
});

//=========================
// 富文本編輯器初始化
//=========================
function initEditor(){
    $('#homeEditor').summernote({lang:'zh-TW',height:250});
    $('#aboutEditor').summernote({lang:'zh-TW',height:250});
}

//=========================
// 上傳Banner圖 (自動轉為 Base64 唯讀欄位)
//=========================
function uploadBanner(e){
    let files = e.target.files;
    for(let i=0;i<files.length;i++){
        let reader = new FileReader();
        reader.onload = function(ev){
            let url = ev.target.result;
            $("#bannerList").append(`<div class="banner-item"><input value="${url}" readonly><button class="del" onclick="del(this)">刪除</button></div>`);
        }
        reader.readAsDataURL(files[i]);
    }
}

//=========================
// 新增輪播欄位 (手動輸入，不設 readonly)
//=========================
function addBanner(){
    $("#bannerList").append(`<div class="banner-item"><input placeholder="可在此處貼上外部圖片網址 (https://...)"><button class="del" onclick="del(this)">刪除</button></div>`);
}

//=========================
// 自訂表單欄位
//=========================
function addFormField(){
    $("#formFields").append(`
    <div class="field-item">
        <input placeholder="欄位名稱" class="fname">
        <select class="ftype">
            <option value="text">文字</option>
            <option value="email">信箱</option>
            <option value="textarea">多行</option>
            <option value="select">下拉</option>
        </select>
        <button class="del" onclick="del(this)">刪除</button>
    </div>`);
}

function del(el){$(el).parent().remove();}

//=========================
// 儲存全部資料
//=========================
function saveAllData(){
    let banners = [];
    $("#bannerList input").each(function(){
        let val = $(this).val().trim();
        if(val !== "") banners.push(val);
    });
    
    let fields = [];
    $(".field-item").each(function(){
        let name = $(this).find(".fname").val().trim();
        if(name !== "") {
            fields.push({
                name: name,
                type: $(this).find(".ftype").val()
            });
        }
    });

    let data = {
        banners: banners,
        carouselSpeed: $("#carouselSpeed").val() || 3000,
        home: $('#homeEditor').summernote('code'),
        about: $('#aboutEditor').summernote('code'),
        formTitle: $("#formTitle").val(),
        formDesc: $("#formDesc").val(),
        formFields: fields
    };

    localStorage.setItem("websiteData", JSON.stringify(data));
    showStatus("✅ 儲存成功！前台已同步更新", "success");
    
    // 儲存後重新讀取以刷新介面狀態
    loadData();
}

//=========================
// 讀取資料 (加入清空機制以防重複堆疊)
//=========================
function loadData(){
    let d = localStorage.getItem("websiteData");
    if(!d) return;
    d = JSON.parse(d);
    
    $("#carouselSpeed").val(d.carouselSpeed || 3000);
    $("#formTitle").val(d.formTitle || "");
    $("#formDesc").val(d.formDesc || "");
    $('#homeEditor').summernote('code', d.home || '');
    $('#aboutEditor').summernote('code', d.about || '');
    
    // 【關鍵修正】渲染前先清空輪播圖列表
    $("#bannerList").empty();
    if(d.banners){
        d.banners.forEach(u=>{
            // 判斷是否為本地上傳的 base64 圖片（若是，則鎖定 input 防止誤刪改原始碼）
            let isBase64 = u.startsWith("data:image");
            $("#bannerList").append(`<div class="banner-item"><input value="${u}" ${isBase64 ? 'readonly' : ''} placeholder="圖片網址"><button class="del" onclick="del(this)">刪除</button></div>`);
        });
    }
    
    // 【關鍵修正】渲染前先清空自訂表單列表
    $("#formFields").empty();
    if(d.formFields){
        d.formFields.forEach(f=>{
            $("#formFields").append(`
            <div class="field-item">
                <input value="${f.name}" class="fname" placeholder="欄位名稱">
                <select class="ftype">
                    <option value="text" ${f.type=='text'?'selected':''}>文字</option>
                    <option value="email" ${f.type=='email'?'selected':''}>信箱</option>
                    <option value="textarea" ${f.type=='textarea'?'selected':''}>多行</option>
                    <option value="select" ${f.type=='select'?'selected':''}>下拉</option>
                </select>
                <button class="del" onclick="del(this)">刪除</button>
            </div>`);
        });
    }
}

function showStatus(msg, type){
    $("#status").text(msg).removeClass("success error").addClass(type).show();
    setTimeout(()=>{$("#status").hide();},3000);
}
</script>
</body>
</html>
